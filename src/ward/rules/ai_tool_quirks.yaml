# AI-tool-specific quirks.
#
# These rules target probes aimed at specific AI coding assistants. They
# tend to use product-specific tags or command names. The presence of these
# in untrusted text is rarely innocent.

- id: ait.anthropic_tags
  category: ai_tool_specific
  severity: high
  description: "Anthropic-style XML-ish role tags in untrusted text"
  patterns:
    - '(?i)<\s*(?:human|assistant|system)\s*>\s*(?:ignore|disregard|forget|override|your\s+new)'
    - '\\n\\nHuman:\s+(?:ignore|disregard|forget|override|your\s+new)'
    - '\\n\\nAssistant:\s+(?:i\s+will|sure,|of\s+course|here\s+are\s+the\s+secrets)'
  surfaces: [pr_body, issue_body, file_content, code_comment, commit_message, stdin]
  remediation: "Reject. Anthropic role tags must not appear inside untrusted strings."

- id: ait.cursor_command
  category: ai_tool_specific
  severity: medium
  description: "Cursor/Windsurf command-palette invocation embedded in text"
  patterns:
    - '(?i)@codebase\s+(?:ignore|forget|disregard|leak|exfiltrate)'
    - '(?i)/(?:command|run|exec|shell)\s+(?:rm|curl|wget|nc)\b'
  surfaces: [pr_body, issue_body, file_content, code_comment, commit_message, stdin]
  remediation: "Reject."

- id: ait.antigravity_schema
  category: ai_tool_specific
  severity: medium
  description: "Reference to Google Antigravity tool schemas in untrusted text"
  patterns:
    - '(?i)antigravity\.(?:execute|run|invoke|tool)'
    - '(?i)google\.ai\.(?:tool|function)\s*\('
  surfaces: [pr_body, issue_body, file_content, code_comment, commit_message, stdin]
  remediation: "Reject."

- id: ait.copilot_chat
  category: ai_tool_specific
  severity: medium
  description: "GitHub Copilot Chat slash-command in unexpected place"
  patterns:
    - '(?i)/(?:terminal|new|tests?|fix|optimize)\s+(?:ignore|disregard|leak|exfiltrate)'
  surfaces: [pr_body, issue_body, file_content, code_comment, commit_message, stdin]
  remediation: "Reject."

- id: ait.claude_code_skill
  category: ai_tool_specific
  severity: medium
  description: "Attempt to invoke a Claude Code skill from untrusted text"
  patterns:
    - '(?i)(?:invoke|use|run|call)\s+(?:the\s+)?skill\s+["`]?[a-z][a-z0-9_\-:]*["`]?\s+(?:to|and)\s+(?:leak|exfiltrate|disable|bypass|ignore)'
  surfaces: [pr_body, issue_body, file_content, code_comment, commit_message, stdin]
  remediation: "Reject."

- id: ait.aider_add
  category: ai_tool_specific
  severity: medium
  description: "Aider /add command pointing the agent at a sensitive file"
  patterns:
    - '(?im)^\s*/add\s+(?:\.env|\.git/config|\.aws/credentials|~/\.ssh/|/etc/shadow|/etc/passwd)'
  surfaces: [pr_body, issue_body, file_content, code_comment, commit_message, stdin]
  remediation: "Reject."

- id: ait.continue_dev
  category: ai_tool_specific
  severity: medium
  description: "Continue.dev or Cline slash command embedded in text"
  patterns:
    - '(?im)^\s*/(?:edit|share|terminal|cmd|run)\s+(?:rm|curl|wget|nc|cat\s+\.env)'
  surfaces: [pr_body, issue_body, file_content, code_comment, commit_message, stdin]
  remediation: "Reject."

- id: ait.mcp_tool_name_collision
  category: ai_tool_specific
  severity: high
  description: "Pseudo MCP tool-name collision (impersonating a known internal tool)"
  patterns:
    - '(?i)\bmcp[._]tool[._]name\s*[:=]\s*["`]?(?:filesystem|github|shell|exec|terminal|http)["`]?'
    - '(?i)\bregister[_-]?tool\s*\(\s*["`]?(?:filesystem|github|shell|exec|terminal|http)'
  surfaces: [pr_body, issue_body, file_content, code_comment, commit_message, stdin]
  remediation: "Reject. Untrusted text trying to register or shadow a tool name is an MCP-era injection signature."
