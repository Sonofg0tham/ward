description: "Config change that legitimately mentions 'role: admin' in YAML"
inputs:
  - surface: pr_title
    text: "Grant deploy bot the admin role"
  - surface: pr_body
    text: |
      The deploy bot needs admin role on the staging cluster to run
      migrations. Production access remains unchanged.
  - surface: file_content
    text: |
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: deploy-bot
      subjects:
        - kind: ServiceAccount
          name: deploy-bot
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: admin
